<!--
  Gold-line pictogram set for Realm Manager chrome.
  Each icon is a 24x24 viewBox using `currentColor` so it can be styled via CSS.
  Hairline stroke, rounded joins — matches the detailed role SVGs in spirit
  while remaining tiny enough for nav/topbar use.

  Usage: include inline <svg>, or lift a <symbol> by id.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- Generic stroke config applied via CSS: stroke-width 1.25, round caps. -->
  </defs>

  <!-- ⚔️ SQUAD — crossed swords (cleaner) -->
  <symbol id="icn-squad" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 4l9 9"/>
    <path d="M4 4h2v2"/>
    <path d="M14.5 14.5l1.5 1.5-2 2-1.5-1.5"/>
    <path d="M20 4l-9 9"/>
    <path d="M20 4h-2v2"/>
    <path d="M9.5 14.5L8 16l2 2 1.5-1.5"/>
  </symbol>

  <!-- 🎯 TACTICS — target / pip grid -->
  <symbol id="icn-tactics" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8"/>
    <circle cx="12" cy="12" r="4.5"/>
    <circle cx="12" cy="12" r="1.25" fill="currentColor"/>
    <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
  </symbol>

  <!-- ⚔️ BATTLE — sword through shield -->
  <symbol id="icn-battle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 4h7v6c0 3.5-3 6-3.5 6S5 13.5 5 10z"/>
    <path d="M16 3l4 4-9 9-3 1 1-3z"/>
    <path d="M8.5 15.5l-1.5 1.5"/>
  </symbol>

  <!-- ⚜️ DOMINION — fleur-de-lis -->
  <symbol id="icn-dominion" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3c-2 3-2 5 0 7 2-2 2-4 0-7z"/>
    <path d="M12 10c-3 1-5 3-5 6 2 0 4-1 5-3"/>
    <path d="M12 10c3 1 5 3 5 6-2 0-4-1-5-3"/>
    <path d="M7 13h10"/>
    <path d="M12 13v8"/>
  </symbol>

  <!-- 🏰 TOWN — castle crenellations -->
  <symbol id="icn-town" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 20V8l2 2V7l2 2V7l2 2V7l2 2V7l2 2V7l2 2V7l2 2v-2l2 2v12z"/>
    <path d="M3 14h18"/>
    <rect x="10.5" y="15" width="3" height="5"/>
  </symbol>

  <!-- 🤝 HIRE — handshake (simplified) -->
  <symbol id="icn-hire" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 10l4-3 4 2 2-1 3 1 4 3v4l-4 3-4-2-2 1-3-1-4-3z"/>
    <path d="M9 9l3 3 3-3"/>
  </symbol>

  <!-- 📒 LEDGER — book / spine -->
  <symbol id="icn-ledger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 4h12a2 2 0 0 1 2 2v14l-3-1.5L13 20l-3-1.5L7 20l-2-1z"/>
    <path d="M9 8h6M9 11h6M9 14h4"/>
  </symbol>

  <!-- 📖 GUIDE — open book -->
  <symbol id="icn-guide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 5c3 0 6 1 8 3 2-2 5-3 8-3v13c-3 0-6 1-8 3-2-2-5-3-8-3z"/>
    <path d="M12 8v12"/>
  </symbol>

  <!-- 💰 GOLD — coin with crown mark -->
  <symbol id="icn-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8"/>
    <path d="M9 10l1 2 2-3 2 3 1-2"/>
    <path d="M9 15h6"/>
  </symbol>

  <!-- 🥉 TIER — laurel / medal -->
  <symbol id="icn-tier" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="13" r="6"/>
    <path d="M6 13c-2-1-3-3-3-5 2 0 4 1 5 2"/>
    <path d="M18 13c2-1 3-3 3-5-2 0-4 1-5 2"/>
    <path d="M10 13l1.5 1.5L14 12"/>
  </symbol>

  <!-- 📈 INCOME — up arrow -->
  <symbol id="icn-income" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 16l5-5 3 3 7-7"/>
    <path d="M14 7h5v5"/>
  </symbol>

  <!-- 📉 WAGES — down arrow / coin out -->
  <symbol id="icn-wages" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="8" cy="9" r="3.5"/>
    <path d="M13 12l4 4M17 11v5h-5"/>
  </symbol>

  <!-- 📅 WEEK — calendar -->
  <symbol id="icn-week" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="5" width="16" height="15" rx="1"/>
    <path d="M4 10h16M8 3v4M16 3v4"/>
  </symbol>

  <!-- ⭐ SEASON — star in ring -->
  <symbol id="icn-season" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8"/>
    <path d="M12 8l1.2 2.6 2.8.3-2 2 .5 2.8L12 14.4 9.5 15.7l.5-2.8-2-2 2.8-.3z"/>
  </symbol>

  <!-- ⚔ POWER — sword (vertical) -->
  <symbol id="icn-power" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3v13"/>
    <path d="M9 16h6l-1 4h-4z"/>
    <path d="M10 6l2-2 2 2"/>
  </symbol>

  <!-- 🧠 MENTAL — scroll + quill -->
  <symbol id="icn-mental" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 4h10a2 2 0 0 1 2 2v12a2 2 0 0 0 2 2H8a2 2 0 0 1-2-2z"/>
    <path d="M9 9h6M9 12h4"/>
  </symbol>

  <!-- 💛 MORALE — heart / banner -->
  <symbol id="icn-morale" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.5-7 10-7 10z"/>
  </symbol>

  <!-- ⚡ FATIGUE — crescent / hourglass -->
  <symbol id="icn-fatigue" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 3h12M6 21h12"/>
    <path d="M7 3c0 4 4 5 5 8 1 3 5 4 5 8"/>
    <path d="M17 3c0 4-4 5-5 8-1 3-5 4-5 8"/>
  </symbol>

  <!-- 📜 CONTRACT — scroll -->
  <symbol id="icn-contract" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 5h11a2 2 0 0 1 2 2v10a2 2 0 0 0 2 2H7a2 2 0 0 1-2-2z"/>
    <path d="M8 9h7M8 12h7M8 15h4"/>
  </symbol>

  <!-- 🏹 ROLE SHORTHAND (used inline in byline — tiny simplified) -->
  <symbol id="icn-r-warrior" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 20l10-10M14 10l6-6M14 10l-4 4M4 20l4-4M16 4h4v4"/>
  </symbol>
  <symbol id="icn-r-ranger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 5c0 7 7 14 14 14"/>
    <path d="M5 5l14 14"/>
    <path d="M5 5h3M5 5v3"/>
    <path d="M19 19h-3M19 19v-3"/>
  </symbol>
  <symbol id="icn-r-mage" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="6"/>
    <path d="M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M16 16l2 2M6 18l2-2M16 8l2-2"/>
  </symbol>
  <symbol id="icn-r-rogue" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 18l10-10M14 6l4 4M16 8l2-2"/>
    <path d="M6 18l-2 2M6 18l2 2"/>
  </symbol>
  <symbol id="icn-r-cleric" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4v16M6 10h12"/>
  </symbol>
  <symbol id="icn-r-paladin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4l7 3v6c0 4-3 6-7 8-4-2-7-4-7-8V7z"/>
    <path d="M12 8v8M8 12h8"/>
  </symbol>

  <!-- 🗡️ VANGUARD — shield + crossed sword -->
  <symbol id="icn-vanguard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 5h6v8c0 3-1.5 5-3 6-1.5-1-3-3-3-6z"/>
    <path d="M14 4l5 5-7 7-2-2z"/>
    <path d="M16 2l2 2"/>
  </symbol>

  <!-- 🏹 SKIRMISHER — bow + arrow -->
  <symbol id="icn-skirmisher" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 5c0 6 5 11 11 11"/>
    <path d="M5 5l14 14"/>
    <path d="M14 5h5v5"/>
  </symbol>

  <!-- ✨ ARBITER — staff + star/orb -->
  <symbol id="icn-arbiter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="8" cy="8" r="3"/>
    <path d="M10.5 10.5L20 20"/>
    <path d="M8 4v1M8 11v1M4 8h1M11 8h1"/>
  </symbol>

  <!-- × CLOSE -->
  <symbol id="icn-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
    <path d="M6 6l12 12M18 6L6 18"/>
  </symbol>

  <!-- + NEW CONTRACT -->
  <symbol id="icn-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <path d="M12 5v14M5 12h14"/>
  </symbol>

  <!-- Alert bell -->
  <symbol id="icn-alert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 17h12l-2-3V10a4 4 0 0 0-8 0v4z"/>
    <path d="M10 20a2 2 0 0 0 4 0"/>
  </symbol>

  <!-- Mood: smile / neutral / frown -->
  <symbol id="icn-mood-high" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round">
    <circle cx="12" cy="12" r="8"/>
    <path d="M9 14c1 1.5 2 2 3 2s2-.5 3-2"/>
    <circle cx="9.5" cy="10.5" r=".6" fill="currentColor"/>
    <circle cx="14.5" cy="10.5" r=".6" fill="currentColor"/>
  </symbol>
  <symbol id="icn-mood-steady" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round">
    <circle cx="12" cy="12" r="8"/>
    <path d="M9 15h6"/>
    <circle cx="9.5" cy="10.5" r=".6" fill="currentColor"/>
    <circle cx="14.5" cy="10.5" r=".6" fill="currentColor"/>
  </symbol>
  <symbol id="icn-mood-low" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round">
    <circle cx="12" cy="12" r="8"/>
    <path d="M9 16c1-1.5 2-2 3-2s2 .5 3 2"/>
    <circle cx="9.5" cy="10.5" r=".6" fill="currentColor"/>
    <circle cx="14.5" cy="10.5" r=".6" fill="currentColor"/>
  </symbol>
</svg>
